<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/style.css">
    <title>Whatsapp Game</title>
</head>
<body>

    <screen_1 id="first_screen">

        <div class="foto">
            <button id="start-btn" class="start-btn">
                start
            </button>
        </div>

    </screen_1>

    <screen_2 id="second_screen">

        <div class="whatsapp-layout">

            <!-- Sidebar with chats -->
            <div class="chat-sidebar">

                <ul>

                    <li id="chat-Ahmad">Ahmad</li>
                    <li id="chat-Sarah">Sarah</li>
                    <li id="chat-Omar">Omar</li>
                    <li id="chat-Lina">Lina</li>
                    <li id="chat-David-Item">David</li>

                </ul>
                
            </div>

            <!-- Chat area -->
            <div class="chat-area">
                <div id="chat-header">
                    Ahmad
                </div>

                <div class="chat-messages">
                    <div class="message other">Hey, are you there?</div>
                    <div class="message me">Yes, what's up?</div>
                </div>

                <div class="chat-input">
                    <input type="text" placeholder="Type a message...">
                    <button>Send</button>
                </div>
            </div>

        </div>

    </screen_2>

</body>
<script type="module" src="../js/main.js"></script>
</html>
